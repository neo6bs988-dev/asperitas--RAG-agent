name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONHASHSEED: "0"
  PYTHONUTF8: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  python-smoke:
    name: Python smoke checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ASPERITAS_EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

    steps:
      - name: Checkout exact source head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false
          clean: true
          show-progress: false

      - name: Verify exact checked-out revision
        shell: bash
        run: |
          set -euo pipefail

          actual_head="$(git rev-parse HEAD)"
          expected_head="${ASPERITAS_EXPECTED_HEAD_SHA}"

          echo "Expected HEAD: ${expected_head}"
          echo "Actual HEAD:   ${actual_head}"

          if [[ "${actual_head}" != "${expected_head}" ]]; then
            echo "::error::Checked-out revision does not match the expected event SHA."
            exit 1
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt

      - name: Initialize CI evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-results

          {
            echo "workflow=${GITHUB_WORKFLOW}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "event=${GITHUB_EVENT_NAME}"
            echo "ref=${GITHUB_REF}"
            echo "sha=$(git rev-parse HEAD)"
            echo "python_target=3.11"
            echo "full_suite_context=tests-artifacts-retrieval-eval"
          } > ci-results/run-metadata.txt

          git status --short --branch > ci-results/preflight-status.txt

      - name: Install project and CI dependencies
        shell: bash
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,parsers,quality]"

      - name: Verify installed dependency consistency
        shell: bash
        run: |
          set -euo pipefail
          python -m pip check | tee ci-results/pip-check.txt

      - name: Verify package import and CLI surfaces
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY' | tee ci-results/import-smoke.txt
          from __future__ import annotations

          import importlib
          import pathlib
          import sys

          package = importlib.import_module("asperitas_agent")
          version = getattr(package, "__version__", None)

          if not isinstance(version, str) or not version.strip():
              raise SystemExit("asperitas_agent.__version__ is missing or invalid")

          canonical_root = pathlib.Path("src/asperitas_agent").resolve()
          package_search_paths = tuple(
              pathlib.Path(path).resolve()
              for path in getattr(package, "__path__", ())
          )

          if canonical_root not in package_search_paths:
              raise SystemExit(
                  "compatibility package does not route to the canonical src package: "
                  f"canonical={canonical_root}, paths={package_search_paths}"
              )

          cli_module = importlib.import_module("asperitas_agent.cli")
          cli_path = pathlib.Path(cli_module.__file__).resolve()

          try:
              cli_path.relative_to(canonical_root)
          except ValueError as exc:
              raise SystemExit(
                  f"canonical CLI implementation did not resolve under {canonical_root}: "
                  f"{cli_path}"
              ) from exc

          print(f"python={sys.version}")
          print(f"package_version={version}")
          print(f"package_file={pathlib.Path(package.__file__).resolve()}")
          print(f"package_search_paths={package_search_paths}")
          print(f"canonical_cli_path={cli_path}")
          PY

          python -m asperitas_agent.cli --help \
            > ci-results/module-cli-help.txt

          asperitas-agent --help \
            > ci-results/console-cli-help.txt

      - name: Compile canonical Python surfaces
        shell: bash
        run: |
          set -euo pipefail

          python -m compileall \
            -q \
            -f \
            src/asperitas_agent \
            scripts \
            tests

          echo "Python compile check passed." \
            | tee ci-results/compileall.txt

      - name: Run focused static-analysis contracts
        shell: bash
        run: |
          set -euo pipefail

          python -m ruff check \
            scripts/verify_packaging_contract.py \
            scripts/verify_distribution_install.py \
            tests/test_sitecustomize.py \
            | tee ci-results/ruff-focused.txt

      - name: Validate canonical source registry contract
        shell: bash
        run: |
          set -euo pipefail

          python -m asperitas_agent.cli validate-registry-contract \
            | tee ci-results/source-registry-contract.txt

      - name: Validate external benchmark candidate registry
        shell: bash
        run: |
          set -euo pipefail

          python scripts/validate_external_benchmark_registry.py \
            | tee ci-results/external-benchmark-registry.txt

      - name: Run bootstrap and agent-governance regressions
        shell: bash
        run: |
          set -euo pipefail

          python -m pytest -q \
            tests/test_sitecustomize.py \
            tests/test_skill_registry.py \
            tests/test_skill_discovery.py \
            --junitxml=ci-results/targeted-regression.xml

      # The required Quality Gates context `tests-artifacts-retrieval-eval`
      # owns the full 923-test suite and retrieval evaluations. Keeping the
      # smoke context focused avoids executing the same 24-minute suite twice
      # while preserving the mandatory full-suite gate.
      - name: Verify repository artifacts
        shell: bash
        run: |
          set -euo pipefail

          python scripts/verify_artifacts.py \
            | tee ci-results/artifact-verification.txt

      - name: Verify tests did not mutate tracked repository state
        shell: bash
        run: |
          set -euo pipefail

          git status --short --untracked-files=no \
            | tee ci-results/post-test-tracked-status.txt

          if [[ -n "$(git status --porcelain --untracked-files=no)" ]]; then
            echo "::error::CI execution modified tracked repository files."
            git diff --stat
            git diff
            exit 1
          fi

      - name: Verify repository diff hygiene
        shell: bash
        run: |
          set -euo pipefail

          git diff --check \
            | tee ci-results/diff-check.txt

      - name: Write CI summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Asperitas CI"
            echo
            echo "- Required context: \`Python smoke checks\`"
            echo "- Expected SHA: \`${ASPERITAS_EXPECTED_HEAD_SHA}\`"
            echo "- Checked-out SHA: \`$(git rev-parse HEAD 2>/dev/null || echo unavailable)\`"
            echo "- Python: \`3.11\`"
            echo "- Full suite owner: \`tests-artifacts-retrieval-eval\`"
            echo "- Evidence directory: \`ci-results/\`"
            echo
            echo "Passing this job verifies only the named smoke checks."
            echo "The required Quality Gates context owns the full suite and"
            echo "retrieval evaluations. Neither result establishes deployment,"
            echo "production readiness, vulnerability absence, legal or regulatory"
            echo "clearance, scientific validation, or wet-lab validation."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload CI evidence
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ci-python-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-results/
          if-no-files-found: warn
          retention-days: 14
          compression-level: 9
