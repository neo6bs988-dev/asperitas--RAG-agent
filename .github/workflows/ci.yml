name: RAG Quality Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_full_retrieval_eval:
        description: "Run full baseline/mvp003/vector/hybrid retrieval eval"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package and test dependency
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run unit tests
        run: python -m pytest

      - name: Verify artifacts
        run: python scripts/verify_artifacts.py

      - name: Run smoke retrieval eval for protected reference
        run: |
          python scripts/run_retrieval_eval.py --retriever baseline --limit 5
          python scripts/run_retrieval_eval.py --retriever mvp003 --limit 5

      - name: Run full retrieval comparison eval manually
        if: github.event_name == 'workflow_dispatch' && inputs.run_full_retrieval_eval == 'true'
        run: |
          python scripts/run_retrieval_eval.py --retriever baseline --limit 5
          python scripts/run_retrieval_eval.py --retriever mvp003 --limit 5
          python scripts/run_retrieval_eval.py --retriever vector --limit 5
          python scripts/run_retrieval_eval.py --retriever hybrid --limit 5
