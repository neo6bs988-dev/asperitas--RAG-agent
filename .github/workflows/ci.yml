name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python-smoke:
    name: Python smoke checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed surface
        id: surface
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" > changed_files.txt
          else
            git diff --name-only HEAD^ HEAD > changed_files.txt
          fi

          python - <<'PY' >> "$GITHUB_OUTPUT"
          from pathlib import Path
          import fnmatch

          changed = [line.strip() for line in Path("changed_files.txt").read_text(encoding="utf-8").splitlines() if line.strip()]
          docs_only_patterns = (
              "README.md",
              "AGENTS.md",
              "docs/*.md",
              "docs/**/*.md",
              ".github/PULL_REQUEST_TEMPLATE.md",
              ".github/pull_request_template.md",
              ".github/ISSUE_TEMPLATE/*.yml",
              ".github/ISSUE_TEMPLATE/*.yaml",
              "09_LOGS/decision_logs/*.md",
          )
          is_pull_request = "${{ github.event_name }}" == "pull_request"
          docs_only = is_pull_request and bool(changed) and all(
              any(fnmatch.fnmatch(path, pattern) for pattern in docs_only_patterns)
              for path in changed
          )
          print(f"docs_only={'true' if docs_only else 'false'}")
          print("changed_files<<EOF")
          print("\n".join(changed))
          print("EOF")
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        if: steps.surface.outputs.docs_only != 'true'
        run: python -m pip install --upgrade pip pytest

      - name: Install requirements if present
        if: steps.surface.outputs.docs_only != 'true'
        run: |
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

      - name: Validate V11.1 source registry contract
        run: PYTHONPATH=src python -m asperitas_agent.cli validate-registry-contract

      - name: Run docs-only smoke check
        if: steps.surface.outputs.docs_only == 'true'
        run: |
          python - <<'PY'
          from pathlib import Path
          changed = [line.strip() for line in Path("changed_files.txt").read_text(encoding="utf-8").splitlines() if line.strip()]
          for path in changed:
              if path.endswith(".md"):
                  text = Path(path).read_text(encoding="utf-8")
                  if text.count("```") % 2:
                      raise SystemExit(f"unbalanced Markdown code fence: {path}")
          print("Docs-only smoke check passed.")
          PY

      - name: Run pytest when tests exist
        if: steps.surface.outputs.docs_only != 'true'
        run: |
          if [ -d tests ]; then
            python -m pytest -q
          else
            echo "No tests directory found."
          fi

      - name: Verify artifacts when script exists
        if: steps.surface.outputs.docs_only != 'true'
        run: |
          if [ -f scripts/verify_artifacts.py ]; then
            python scripts/verify_artifacts.py
          else
            echo "No artifact verification script found."
          fi

      - name: Diff check
        run: git diff --check
