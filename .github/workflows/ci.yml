name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python-smoke:
    name: Python smoke checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Install requirements if present
        run: |
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

      - name: Validate V11.1 source registry contract
        run: PYTHONPATH=src python -m asperitas_agent.cli validate-registry-contract

      - name: Run pytest when tests exist
        run: |
          if [ -d tests ]; then
            python -m pytest -q
          else
            echo "No tests directory found."
          fi

      - name: Verify artifacts when script exists
        run: |
          if [ -f scripts/verify_artifacts.py ]; then
            python scripts/verify_artifacts.py
          else
            echo "No artifact verification script found."
          fi

      - name: Diff check
        run: git diff --check
