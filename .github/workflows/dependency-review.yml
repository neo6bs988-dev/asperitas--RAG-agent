# =============================================================================
# Asperitas Dependency Security Workflow v1.1
# =============================================================================
#
# Purpose:
# - block pull requests that introduce dependencies with known vulnerabilities;
# - audit the resolved third-party Python dependency surface using pip-audit;
# - preserve exact-head identity and minimum GitHub token permissions;
# - retain machine-readable dependency-security evidence;
# - avoid treating the unpublished editable Asperitas package as a PyPI target;
# - avoid claiming that successful scanners prove vulnerability absence.
# =============================================================================

name: Dependency Security

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

  push:
    branches:
      - main
    paths:
      - "pyproject.toml"
      - "requirements*.txt"
      - "constraints*.txt"
      - ".github/dependabot.yml"
      - ".github/workflows/dependency-review.yml"

  # Monday 05:17 KST / Sunday 20:17 UTC
  schedule:
    - cron: "17 20 * * 0"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONHASHSEED: "0"
  PYTHONUTF8: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      ASPERITAS_EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}

    steps:
      - name: Checkout exact pull-request head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
          clean: true
          show-progress: false

      - name: Verify exact checked-out revision
        shell: bash
        run: |
          set -euo pipefail

          actual_head="$(git rev-parse HEAD)"
          expected_head="${ASPERITAS_EXPECTED_HEAD_SHA}"

          echo "Expected HEAD: ${expected_head}"
          echo "Actual HEAD:   ${actual_head}"

          if [[ "${actual_head}" != "${expected_head}" ]]; then
            echo "::error::Checked-out revision does not match the PR head SHA."
            exit 1
          fi

      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
          fail-on-scopes: runtime, development
          vulnerability-check: true
          license-check: false
          warn-only: false
          show-openssf-scorecard: true
          warn-on-openssf-scorecard-level: 4
          show-patched-versions: true
          retry-on-snapshot-warnings: true
          retry-on-snapshot-warnings-timeout: 120

      - name: Write dependency-review summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Asperitas Dependency Review"
            echo
            echo "- Check context: \`Dependency review\`"
            echo "- Evaluated PR head: \`${ASPERITAS_EXPECTED_HEAD_SHA}\`"
            echo "- Vulnerability threshold: \`moderate\`"
            echo "- Reviewed scopes: \`runtime, development\`"
            echo "- License enforcement: \`disabled pending approved policy\`"
            echo
            echo "A successful check means no dependency change meeting the"
            echo "configured blocking conditions was identified for this PR."
            echo "It does not prove vulnerability absence, license clearance,"
            echo "supply-chain integrity, deployment safety, or production readiness."
          } >> "$GITHUB_STEP_SUMMARY"

  python-dependency-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      ASPERITAS_EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

    steps:
      - name: Checkout exact source revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false
          clean: true
          show-progress: false

      - name: Verify exact checked-out revision
        shell: bash
        run: |
          set -euo pipefail

          actual_head="$(git rev-parse HEAD)"
          expected_head="${ASPERITAS_EXPECTED_HEAD_SHA}"

          echo "Expected HEAD: ${expected_head}"
          echo "Actual HEAD:   ${actual_head}"

          if [[ "${actual_head}" != "${expected_head}" ]]; then
            echo "::error::Checked-out revision does not match the expected event SHA."
            exit 1
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt
            constraints*.txt

      - name: Initialize dependency-security evidence
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p security-results

          {
            echo "workflow=${GITHUB_WORKFLOW}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "event=${GITHUB_EVENT_NAME}"
            echo "ref=${GITHUB_REF}"
            echo "expected_sha=${ASPERITAS_EXPECTED_HEAD_SHA}"
            echo "checked_out_sha=$(git rev-parse HEAD)"
            echo "runner_os=${RUNNER_OS}"
            echo "runner_arch=${RUNNER_ARCH}"
            echo "python_target=3.11"
          } > security-results/run-metadata.txt

      - name: Install declared Asperitas dependency surfaces
        shell: bash
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip
          python -m pip install \
            -e ".[dev,parsers,ui,quality,security,packaging]"

          python -m pip --version \
            | tee security-results/pip-version.txt

          python -m pip check \
            | tee security-results/pip-check.txt

          python -m pip freeze --all \
            > security-results/environment-freeze.txt

      - name: Build deterministic third-party audit input
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          from __future__ import annotations

          from pathlib import Path

          source = Path("security-results/environment-freeze.txt")
          destination = Path("security-results/audit-requirements.txt")
          exclusions = Path("security-results/audit-exclusions.txt")

          kept: list[str] = []
          removed: list[str] = []

          for raw_line in source.read_text(encoding="utf-8").splitlines():
              line = raw_line.strip()
              folded = line.casefold().replace("-", "_")

              is_local_asperitas_editable = (
                  line.startswith("-e ")
                  and "#egg=asperitas_agent" in folded
              )
              is_local_asperitas_file_reference = (
                  folded.startswith("asperitas_agent @ file:")
              )

              if is_local_asperitas_editable or is_local_asperitas_file_reference:
                  removed.append(line)
                  continue

              if line:
                  kept.append(line)

          if len(removed) != 1:
              raise SystemExit(
                  "Expected exactly one local Asperitas distribution record; "
                  f"found {len(removed)}."
              )

          if not kept:
              raise SystemExit("Third-party audit input is empty.")

          destination.write_text("\n".join(kept) + "\n", encoding="utf-8")
          exclusions.write_text("\n".join(removed) + "\n", encoding="utf-8")
          PY

      - name: Audit resolved third-party Python dependencies
        shell: bash
        run: |
          set -euo pipefail

          python -m pip_audit \
            --requirement security-results/audit-requirements.txt \
            --strict \
            --progress-spinner off \
            --format json \
            --output security-results/pip-audit.json

      - name: Record human-readable dependency audit
        if: always()
        shell: bash
        run: |
          set -o pipefail

          if [[ ! -s security-results/audit-requirements.txt ]]; then
            echo "Audit requirements were not generated." \
              | tee security-results/pip-audit.txt
            exit 0
          fi

          python -m pip_audit \
            --requirement security-results/audit-requirements.txt \
            --strict \
            --progress-spinner off \
            --format columns \
            2>&1 | tee security-results/pip-audit.txt

          exit 0

      - name: Verify audit did not mutate tracked repository files
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          git status --short --untracked-files=no \
            | tee security-results/post-audit-tracked-status.txt

          if [[ -n "$(git status --porcelain --untracked-files=no)" ]]; then
            echo "::error::Dependency audit modified tracked repository files."
            git diff --stat
            git diff
            exit 1
          fi

      - name: Verify repository diff hygiene
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          git diff --check \
            | tee security-results/diff-check.txt

      - name: Generate evidence checksums
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          from __future__ import annotations

          import hashlib
          from pathlib import Path

          root = Path("security-results")
          root.mkdir(exist_ok=True)
          output = root / "SHA256SUMS"
          lines: list[str] = []

          for path in sorted(root.rglob("*")):
              if not path.is_file() or path == output:
                  continue

              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              relative = path.relative_to(root).as_posix()
              lines.append(f"{digest}  {relative}")

          output.write_text(
              "\n".join(lines) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Write Python dependency-audit summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Asperitas Python Dependency Audit"
            echo
            echo "- Check context: \`Python dependency audit\`"
            echo "- Expected SHA: \`${ASPERITAS_EXPECTED_HEAD_SHA}\`"
            echo "- Checked-out SHA: \`$(git rev-parse HEAD 2>/dev/null || echo unavailable)\`"
            echo "- Python: \`3.11\`"
            echo "- Audit mode: resolved third-party environment"
            echo "- Local project exclusion: one exact editable/file distribution record"
            echo "- Automatic fixes: disabled"
            echo "- Evidence directory: \`security-results/\`"
            echo
            echo "A successful result means pip-audit did not identify a known"
            echo "vulnerability in the audited third-party environment at run time."
            echo "Advisory databases, dependency resolution, applicability, and"
            echo "false-positive assessment remain external and time-dependent."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload dependency-security evidence
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dependency-security-${{ github.run_id }}-${{ github.run_attempt }}
          path: security-results/
          if-no-files-found: error
          retention-days: 14
          compression-level: 9
