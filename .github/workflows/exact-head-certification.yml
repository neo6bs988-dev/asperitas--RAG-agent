name: Exact Head Certification

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: exact-head-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONHASHSEED: "0"
  PYTHONUTF8: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  packaging-import-bootstrap:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.10"
          - os: ubuntu-latest
            python: "3.11"
          - os: windows-latest
            python: "3.11"

    env:
      ASPERITAS_EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

    steps:
      - name: Checkout exact source head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false
          clean: true
          show-progress: false

      - name: Verify exact checked-out revision
        shell: bash
        run: |
          set -euo pipefail

          actual_head="$(git rev-parse HEAD)"
          expected_head="${ASPERITAS_EXPECTED_HEAD_SHA}"

          echo "Expected HEAD: ${expected_head}"
          echo "Actual HEAD:   ${actual_head}"

          if [[ "${actual_head}" != "${expected_head}" ]]; then
            echo "::error::Checked-out revision does not match the event head SHA."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt

      - name: Initialize certification evidence
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p certification-results

          {
            echo "workflow=${GITHUB_WORKFLOW}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "event=${GITHUB_EVENT_NAME}"
            echo "ref=${GITHUB_REF}"
            echo "expected_sha=${ASPERITAS_EXPECTED_HEAD_SHA}"
            echo "checked_out_sha=$(git rev-parse HEAD)"
            echo "runner_os=${RUNNER_OS}"
            echo "runner_arch=${RUNNER_ARCH}"
            echo "matrix_os=${{ matrix.os }}"
            echo "matrix_python=${{ matrix.python }}"
          } > certification-results/run-metadata.txt

          git status --short --branch \
            > certification-results/preflight-status.txt

      - name: Install certification dependencies
        shell: bash
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,parsers,packaging,quality]"

          python -m pip --version \
            | tee certification-results/pip-version.txt

          python -m pip check \
            | tee certification-results/pip-check.txt

          python -m pip freeze --all \
            > certification-results/environment-freeze.txt

      - name: Compile certification surfaces
        shell: bash
        run: |
          set -euo pipefail

          python -m compileall \
            -q \
            -f \
            src/asperitas_agent \
            scripts/verify_packaging_contract.py \
            scripts/verify_distribution_install.py \
            tests/test_sitecustomize.py \
            tests/test_skill_registry.py \
            tests/test_skill_discovery.py

          echo "Compile check passed." \
            | tee certification-results/compileall.txt

      - name: Verify focused lint contracts
        shell: bash
        run: |
          set -euo pipefail

          python -m ruff check \
            scripts/verify_packaging_contract.py \
            scripts/verify_distribution_install.py \
            tests/test_sitecustomize.py \
            tests/test_skill_registry.py \
            tests/test_skill_discovery.py \
            | tee certification-results/ruff.txt

      - name: Verify exact-head packaging and CLI contract
        shell: bash
        run: |
          set -euo pipefail

          python scripts/verify_packaging_contract.py \
            --json \
            --output certification-results/packaging-contract.json

      - name: Validate canonical source registries
        shell: bash
        run: |
          set -euo pipefail

          python -m asperitas_agent.cli validate-registry-contract \
            | tee certification-results/source-registry-contract.txt

          python scripts/validate_external_benchmark_registry.py \
            | tee certification-results/external-benchmark-registry.txt

      - name: Run repository bootstrap regression
        shell: bash
        run: |
          set -euo pipefail

          python -m pytest -q \
            tests/test_sitecustomize.py \
            --junitxml=certification-results/sitecustomize.xml

      - name: Run agent governance regression
        shell: bash
        run: |
          set -euo pipefail

          python -m pytest -q \
            tests/test_skill_registry.py \
            tests/test_skill_discovery.py \
            --junitxml=certification-results/agent-governance.xml

      - name: Build wheel and source distribution
        shell: bash
        run: |
          set -euo pipefail

          python -c "from pathlib import Path; import shutil; shutil.rmtree(Path('dist'), ignore_errors=True)"

          python -m build \
            | tee certification-results/build.txt

      - name: Verify wheel contents and clean isolated install
        shell: bash
        run: |
          set -euo pipefail

          python scripts/verify_distribution_install.py \
            --dist-dir dist \
            --json \
            --output certification-results/distribution-install.json

      - name: Record distribution checksums
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          from __future__ import annotations

          import hashlib
          from pathlib import Path

          dist = Path("dist")
          output = Path("certification-results/distribution-sha256.txt")
          lines: list[str] = []

          for path in sorted(dist.iterdir()):
              if not path.is_file():
                  continue

              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              lines.append(f"{digest}  {path.name}")

          if not lines:
              raise SystemExit("No distribution files were produced.")

          output.write_text(
              "\n".join(lines) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Verify certification did not mutate tracked files
        shell: bash
        run: |
          set -euo pipefail

          git status --short --untracked-files=no \
            | tee certification-results/post-certification-tracked-status.txt

          if [[ -n "$(git status --porcelain --untracked-files=no)" ]]; then
            echo "::error::Certification modified tracked repository files."
            git diff --stat
            git diff
            exit 1
          fi

      - name: Verify repository diff hygiene
        shell: bash
        run: |
          set -euo pipefail

          git diff --check \
            | tee certification-results/diff-check.txt

      - name: Generate certification evidence checksums
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          from __future__ import annotations

          import hashlib
          from pathlib import Path

          root = Path("certification-results")
          root.mkdir(exist_ok=True)
          output = root / "SHA256SUMS"

          lines: list[str] = []

          for path in sorted(root.rglob("*")):
              if not path.is_file() or path == output:
                  continue

              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              relative_path = path.relative_to(root).as_posix()
              lines.append(f"{digest}  {relative_path}")

          output.write_text(
              "\n".join(lines) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Write exact-head certification summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Asperitas Exact Head Certification"
            echo
            echo "- Required context: \`${{ matrix.os }} / Python ${{ matrix.python }}\`"
            echo "- Expected SHA: \`${ASPERITAS_EXPECTED_HEAD_SHA}\`"
            echo "- Checked-out SHA: \`$(git rev-parse HEAD 2>/dev/null || echo unavailable)\`"
            echo "- Runner: \`${RUNNER_OS}/${RUNNER_ARCH}\`"
            echo "- Evidence directory: \`certification-results/\`"
            echo
            echo "A successful job certifies only the packaging, import, CLI,"
            echo "registry, bootstrap, governance, distribution, and hygiene"
            echo "contracts executed on this exact SHA and environment."
            echo "It does not establish deployment, production readiness,"
            echo "legal or regulatory clearance, scientific validation,"
            echo "wet-lab validation, or vulnerability absence."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload run-scoped certification evidence
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: exact-head-${{ matrix.os }}-py${{ matrix.python }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: certification-results/
          if-no-files-found: error
          retention-days: 14
          compression-level: 9
