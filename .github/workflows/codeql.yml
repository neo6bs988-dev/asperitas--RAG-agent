# =============================================================================
# Asperitas CodeQL Advanced Security Workflow v2.1-FINAL
# =============================================================================
#
# Scope:
# - Python implementation, scripts, and supporting code
# - GitHub Actions workflow definitions
#
# Design:
# - analyze the GitHub event revision, including the PR merge revision
# - run each language in an isolated matrix job
# - use the security-and-quality query suite
# - upload SARIF and wait until GitHub processes it
# - preserve stable analysis categories
# - use immutable Action commit SHAs
# - minimize token permissions, storage, and unnecessary build work
#
# Truth boundary:
# A successful workflow confirms only that the configured CodeQL queries
# completed and that GitHub accepted the analysis for the analyzed revision.
# It does not prove vulnerability absence, production readiness, legal
# clearance, scientific validation, or complete security coverage.
# =============================================================================

name: CodeQL

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

  # Required when the repository later enables a GitHub merge queue.
  merge_group:

  # Thursday 05:37 KST / Wednesday 20:37 UTC.
  schedule:
    - cron: "37 20 * * 3"

  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

  # Cancel superseded PR/merge-queue analyses.
  # Never cancel default-branch or scheduled baseline analyses.
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}

jobs:
  analyze:
    name: CodeQL analysis (${{ matrix.language }})
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    strategy:
      fail-fast: false
      max-parallel: 2

      matrix:
        include:
          - language: actions
            build-mode: "none"

          - language: python
            build-mode: "none"

    steps:
      # On pull_request events, the default checkout revision is GitHub's
      # synthetic merge commit. This evaluates the code as it would exist
      # after merging into the target branch.
      - name: Checkout analyzed event revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
          clean: true
          show-progress: false

      # Verify the checked-out event revision without incorrectly requiring
      # a PR head commit when GitHub intentionally checks out a merge commit.
      - name: Verify analyzed event revision
        shell: bash
        run: |
          set -euo pipefail

          actual_sha="$(git rev-parse HEAD)"
          expected_sha="${GITHUB_SHA}"

          echo "Expected event SHA: ${expected_sha}"
          echo "Checked-out SHA:    ${actual_sha}"

          if [[ "${actual_sha}" != "${expected_sha}" ]]; then
            echo "::error::Checkout does not match the GitHub event revision."
            exit 1
          fi

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

          # Broader than the default security suite:
          # includes security findings and maintainability/code-quality queries.
          queries: security-and-quality

          config: |
            paths-ignore:
              # Large source/data collections that do not contain the
              # canonical executable Python implementation.
              - "01_RAW_SOURCES/**"
              - "03_PROCESSED_KB/**"
              - "09_LOGS/**"
              - "eval_results/**"

              # Generated, cached, and environment-local artifacts.
              - "build/**"
              - "dist/**"
              - ".venv/**"
              - ".pytest_tmp/**"
              - ".mypy_cache/**"
              - ".ruff_cache/**"
              - "**/__pycache__/**"

              # Preserve the current production-code-focused baseline and
              # prevent test-fixture patterns from dominating quality alerts.
              - "tests/**"

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          # Stable category prevents analyses for different languages from
          # replacing each other in GitHub Code Scanning.
          category: "/language:${{ matrix.language }}"

          # Upload results even when query execution produces diagnostic
          # failures, improving failure observability.
          upload: always

          # Do not mark the job successful until GitHub has processed SARIF.
          wait-for-processing: true

          # SARIF is retained by Code Scanning. A separately downloadable
          # CodeQL database is not needed by the current repository workflow.
          upload-database: false

      - name: Write CodeQL execution summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Asperitas CodeQL v2.1-FINAL"
            echo
            echo "- Language: \`${{ matrix.language }}\`"
            echo "- Build mode: \`${{ matrix.build-mode }}\`"
            echo "- Query suite: \`security-and-quality\`"
            echo "- Event: \`${GITHUB_EVENT_NAME}\`"
            echo "- Event SHA: \`${GITHUB_SHA}\`"
            echo "- Checked-out SHA: \`$(git rev-parse HEAD 2>/dev/null || echo unavailable)\`"
            echo "- Runner: \`${RUNNER_OS}/${RUNNER_ARCH}\`"
            echo "- SARIF processing wait: \`enabled\`"
            echo "- CodeQL database upload: \`disabled\`"
            echo
            echo "A successful result confirms only that the configured"
            echo "analysis completed and GitHub processed its results."
            echo "It does not establish vulnerability absence or production security."
          } >> "${GITHUB_STEP_SUMMARY}"
