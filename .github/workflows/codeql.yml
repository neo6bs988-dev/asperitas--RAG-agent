# =============================================================================
# Asperitas CodeQL Advanced Security Workflow v2.0
# =============================================================================
#
# Scope:
# - Python source code
# - GitHub Actions workflows
#
# Security controls:
# - least-privilege GitHub token
# - immutable Action commit SHAs
# - no repository secrets
# - no automatic code modification
#
# Truth boundary:
# A successful scan confirms only that the configured CodeQL analysis completed.
# It does not prove vulnerability absence or production security.
# =============================================================================

name: CodeQL

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

  merge_group:

  # Thursday 05:37 KST / Wednesday 20:37 UTC
  schedule:
    - cron: "37 20 * * 3"

  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

  # Cancel outdated PR analyses, but allow default-branch scans to finish.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: "none"

          - language: python
            build-mode: "none"

    steps:
      - name: Checkout analyzed revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          clean: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

          # Includes security and code-quality queries.
          queries: security-and-quality

          config: |
            paths-ignore:
              - "01_RAW_SOURCES/**"
              - "03_PROCESSED_KB/**"
              - "09_LOGS/**"
              - "eval_results/**"
              - "build/**"
              - "dist/**"
              - ".venv/**"
              - "**/__pycache__/**"
              - "tests/**"

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: "/language:${{ matrix.language }}"
