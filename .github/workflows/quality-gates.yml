name: Quality Gates

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-gates-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONHASHSEED: "0"
  PYTHONUTF8: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  quality-gates:
    name: tests-artifacts-retrieval-eval
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      ASPERITAS_EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

    steps:
      - name: Checkout exact source head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false
          clean: true
          show-progress: false

      - name: Verify exact checked-out revision
        shell: bash
        run: |
          set -euo pipefail

          actual_head="$(git rev-parse HEAD)"
          expected_head="${ASPERITAS_EXPECTED_HEAD_SHA}"

          echo "Expected HEAD: ${expected_head}"
          echo "Actual HEAD:   ${actual_head}"

          if [[ "${actual_head}" != "${expected_head}" ]]; then
            echo "::error::Checked-out revision does not match the expected event SHA."
            exit 1
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt

      - name: Initialize quality evidence
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p quality-results

          {
            echo "workflow=${GITHUB_WORKFLOW}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "event=${GITHUB_EVENT_NAME}"
            echo "ref=${GITHUB_REF}"
            echo "expected_sha=${ASPERITAS_EXPECTED_HEAD_SHA}"
            echo "checked_out_sha=$(git rev-parse HEAD)"
            echo "python_target=3.11"
          } > quality-results/run-metadata.txt

          git status --short --branch \
            > quality-results/preflight-status.txt

      - name: Detect changed surface
        id: surface
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
            git diff --name-only "${base_sha}" "${head_sha}" \
              > changed_files.txt

          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            before_sha="${{ github.event.before }}"
            current_sha="${GITHUB_SHA}"

            if [[ "${before_sha}" =~ ^0+$ ]] \
              || ! git cat-file -e "${before_sha}^{commit}" 2>/dev/null; then
              git diff --name-only HEAD^ HEAD \
                > changed_files.txt
            else
              git diff --name-only "${before_sha}" "${current_sha}" \
                > changed_files.txt
            fi

          else
            git ls-files > changed_files.txt
          fi

          cp changed_files.txt quality-results/changed-files.txt

          python - <<'PY' >> "$GITHUB_OUTPUT"
          from __future__ import annotations

          import fnmatch
          import os
          from pathlib import Path

          changed = [
              line.strip()
              for line in Path("changed_files.txt").read_text(
                  encoding="utf-8"
              ).splitlines()
              if line.strip()
          ]

          docs_only_patterns = (
              "README.md",
              "CONTRIBUTING.md",
              "CODE_OF_CONDUCT.md",
              "SUPPORT.md",
              "SECURITY.md",
              "AGENTS.md",
              "gitcore.md",
              "CHECKPOINT_MVP_002.md",
              "docs/*.md",
              "docs/**/*.md",
              ".github/PULL_REQUEST_TEMPLATE.md",
              ".github/pull_request_template.md",
              ".github/ISSUE_TEMPLATE/*.yml",
              ".github/ISSUE_TEMPLATE/*.yaml",
              "09_LOGS/decision_logs/*.md",
          )

          is_pull_request = os.environ["GITHUB_EVENT_NAME"] == "pull_request"
          docs_only = (
              is_pull_request
              and bool(changed)
              and all(
                  any(
                      fnmatch.fnmatch(path, pattern)
                      for pattern in docs_only_patterns
                  )
                  for path in changed
              )
          )

          print(f"docs_only={'true' if docs_only else 'false'}")
          print(f"changed_count={len(changed)}")
          print("changed_files<<EOF")
          print("\n".join(changed))
          print("EOF")
          PY

      - name: Scan changed files for high-confidence secret markers
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          from __future__ import annotations

          import re
          from pathlib import Path

          changed = [
              line.strip()
              for line in Path("changed_files.txt").read_text(
                  encoding="utf-8"
              ).splitlines()
              if line.strip()
          ]

          patterns = {
              "private-key-block": re.compile(
                  r"-----BEGIN "
                  r"(?:RSA |EC |DSA |OPENSSH |PGP )?"
                  r"PRIVATE KEY-----"
              ),
              "github-classic-token": re.compile(
                  r"\bgh[pousr]_[A-Za-z0-9]{36,}\b"
              ),
              "github-fine-grained-token": re.compile(
                  r"\bgithub_pat_[A-Za-z0-9_]{50,}\b"
              ),
              "aws-access-key": re.compile(
                  r"\bAKIA[0-9A-Z]{16}\b"
              ),
              "long-openai-style-secret": re.compile(
                  r"\bsk-(?:proj-)?[A-Za-z0-9_-]{32,}\b"
              ),
          }

          findings: list[str] = []

          for raw_path in changed:
              path = Path(raw_path)

              if not path.is_file():
                  continue

              if path.stat().st_size > 2_000_000:
                  continue

              try:
                  text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue

              for label, pattern in patterns.items():
                  if pattern.search(text):
                      findings.append(f"{raw_path}: {label}")

          if findings:
              for finding in findings:
                  print(f"::error::{finding}")
              raise SystemExit(
                  "High-confidence secret marker detected in changed files."
              )

          print("No high-confidence secret markers detected.")
          PY

      - name: Run docs-only quality gate
        if: steps.surface.outputs.docs_only == 'true'
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY' | tee quality-results/docs-only-gate.txt
          from __future__ import annotations

          import re
          from pathlib import Path

          changed = [
              line.strip()
              for line in Path("changed_files.txt").read_text(
                  encoding="utf-8"
              ).splitlines()
              if line.strip()
          ]

          allowed_prefixes = (
              "docs/",
              ".github/ISSUE_TEMPLATE/",
              "09_LOGS/decision_logs/",
          )

          allowed_exact = {
              "README.md",
              "CONTRIBUTING.md",
              "CODE_OF_CONDUCT.md",
              "SUPPORT.md",
              "SECURITY.md",
              "AGENTS.md",
              "gitcore.md",
              "CHECKPOINT_MVP_002.md",
              ".github/PULL_REQUEST_TEMPLATE.md",
              ".github/pull_request_template.md",
          }

          unexpected = [
              path
              for path in changed
              if path not in allowed_exact
              and not path.startswith(allowed_prefixes)
          ]

          if unexpected:
              raise SystemExit(
                  f"Unexpected docs-only path(s): {unexpected}"
              )

          markdown_files = [
              Path(path)
              for path in changed
              if path.endswith(".md") and Path(path).is_file()
          ]

          for path in markdown_files:
              text = path.read_text(encoding="utf-8")

              if "\x00" in text:
                  raise SystemExit(
                      f"NUL byte detected in Markdown file: {path}"
                  )

              if text.count("```") % 2:
                  raise SystemExit(
                      f"Unbalanced Markdown code fence: {path}"
                  )

          readable_files = [
              Path(path)
              for path in changed
              if Path(path).is_file()
          ]

          combined = "\n".join(
              path.read_text(encoding="utf-8")
              for path in readable_files
              if path.suffix.lower() in {
                  ".md",
                  ".yml",
                  ".yaml",
                  ".txt",
              }
          )

          sensitive_capability = re.compile(
              r"(?is)"
              r"\b("
              r"production\s+(?:rag|kg|vector\s+db)"
              r"|wet[-\s]?lab\s+validation"
              r"|legal\s+(?:approval|clearance)"
              r"|regulatory\s+(?:approval|clearance)"
              r"|proprietary\s+foundation[-\s]?model"
              r"|autonomous\s+lab"
              r")\b"
          )

          positive_status = re.compile(
              r"(?is)"
              r"\b("
              r"is|are|now|ready|validated|approved|deployed"
              r"|implemented|complete|completed|production-ready"
              r")\b"
          )

          negation_markers = (
              "does not",
              "do not",
              "not ",
              "no ",
              "without evidence",
              "unverified",
              "not implemented",
              "truth boundary",
              "must not",
              "forbidden",
              "blocked",
          )

          for capability in sensitive_capability.finditer(combined):
              start = max(0, capability.start() - 180)
              end = min(len(combined), capability.end() + 180)
              context = combined[start:end]
              folded = context.casefold()

              if positive_status.search(context) and not any(
                  marker in folded
                  for marker in negation_markers
              ):
                  raise SystemExit(
                      "Possible unsupported capability-status claim near: "
                      f"{capability.group(0)}"
                  )

          print("Docs-only Quality Gates passed.")
          print(
              "Metric provenance: fresh docs-only checks; "
              "runtime tests and retrieval evaluations not run "
              "under the approved changed-surface policy."
          )
          PY

      - name: Install project and quality dependencies
        if: steps.surface.outputs.docs_only != 'true'
        shell: bash
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,parsers,quality]"

      - name: Verify installed dependency consistency
        if: steps.surface.outputs.docs_only != 'true'
        shell: bash
        run: |
          set -euo pipefail

          python -m pip check \
            | tee quality-results/pip-check.txt

      - name: Validate canonical source registry contract
        if: steps.surface.outputs.docs_only != 'true'
        shell: bash
        run: |
          set -euo pipefail

          python -m asperitas_agent.cli validate-registry-contract \
            | tee quality-results/source-registry-contract.txt

      - name: Validate external benchmark candidate registry
        if: steps.surface.outputs.docs_only != 'true'
        shell: bash
        run: |
          set -euo pipefail

          python scripts/validate_external_benchmark_registry.py \
            | tee quality-results/external-benchmark-registry.txt

      - name: V1.7D validator regression check
        if: steps.surface.outputs.docs_only != 'true'
        shell: bash
        run: |
          set -euo pipefail

          python scripts/validate_v1_7c_biology_compliance_golden_set.py \
            | tee quality-results/v1-7d-validator.txt

          python -m pytest -q \
            tests/test_v1_7c_biology_compliance_golden_set_validator.py \
            --junitxml=quality-results/v1-7d-validator.xml

      - name: V1.8B offline evaluator regression check
        if: steps.surface.outputs.docs_only != 'true'
        shell: bash
        run: |
          set -euo pipefail

          python scripts/evaluate_v1_8b_offline_answer_scoring.py \
            | tee quality-results/v1-8b-evaluator.txt

          python scripts/evaluate_v1_8b_offline_answer_scoring.py \
            --json \
            > quality-results/v1-8b-evaluator.json

          python -m pytest -q \
            tests/test_v1_8b_offline_answer_scoring.py \
            --junitxml=quality-results/v1-8b-evaluator.xml

      - name: V1.11B public-safe development evaluation regression check
        if: steps.surface.outputs.docs_only != 'true'
        shell: bash
        run: |
          set -euo pipefail

          python scripts/validate_v1_11b_representative_biology_compliance_dev.py \
            | tee quality-results/v1-11b-public-safe.txt

          python scripts/validate_v1_11b_representative_biology_compliance_dev.py --json \
            > quality-results/v1-11b-public-safe.json

          python -m pytest -q tests/test_v1_11b_representative_biology_compliance_dev.py \
            --junitxml=quality-results/v1-11b-public-safe.xml

      - name: Run unit tests
        if: steps.surface.outputs.docs_only != 'true'
        shell: bash
        run: |
          set -euo pipefail

          python -m pytest \
            --junitxml=quality-results/pytest.xml

      - name: Verify artifacts
        if: steps.surface.outputs.docs_only != 'true'
        shell: bash
        run: |
          set -euo pipefail

          python scripts/verify_artifacts.py \
            | tee quality-results/artifact-verification.txt

      - name: Audit chunk section metadata
        if: steps.surface.outputs.docs_only != 'true'
        shell: bash
        run: |
          set -euo pipefail

          python scripts/audit_chunk_sections.py \
            --json \
            > quality-results/chunk-sections.json

      - name: Run baseline retrieval eval
        if: steps.surface.outputs.docs_only != 'true'
        shell: bash
        run: |
          set -euo pipefail

          python scripts/run_retrieval_eval.py \
            --retriever baseline \
            --limit 5 \
            | tee quality-results/retrieval-baseline.txt

      - name: Run MVP-003 metadata-aware retrieval eval
        if: steps.surface.outputs.docs_only != 'true'
        shell: bash
        run: |
          set -euo pipefail

          python scripts/run_retrieval_eval.py \
            --retriever mvp003 \
            --limit 5 \
            | tee quality-results/retrieval-mvp003.txt

      - name: Run hybrid retrieval eval
        if: steps.surface.outputs.docs_only != 'true'
        shell: bash
        run: |
          set -euo pipefail

          python scripts/run_retrieval_eval.py \
            --retriever hybrid \
            --limit 5 \
            | tee quality-results/retrieval-hybrid.txt

      - name: Verify quality execution did not mutate tracked files
        if: always() && steps.surface.outputs.docs_only != 'true'
        shell: bash
        run: |
          set -euo pipefail

          git status --short --untracked-files=no \
            | tee quality-results/post-gate-tracked-status.txt

          if [[ -n "$(git status --porcelain --untracked-files=no)" ]]; then
            echo "::error::Quality Gates modified tracked repository files."
            git diff --stat
            git diff
            exit 1
          fi

      - name: Verify repository diff hygiene
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          git diff --check \
            | tee quality-results/diff-check.txt

      - name: Generate evidence checksums
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          find quality-results \
            -type f \
            ! -name SHA256SUMS \
            -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            > quality-results/SHA256SUMS

      - name: Write Quality Gates summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Asperitas Quality Gates"
            echo
            echo "- Required context: \`tests-artifacts-retrieval-eval\`"
            echo "- Expected SHA: \`${ASPERITAS_EXPECTED_HEAD_SHA}\`"
            echo "- Checked-out SHA: \`$(git rev-parse HEAD 2>/dev/null || echo unavailable)\`"
            echo "- Docs-only: \`${{ steps.surface.outputs.docs_only || 'unknown' }}\`"
            echo "- Changed files: \`${{ steps.surface.outputs.changed_count || 'unknown' }}\`"
            echo "- Evidence directory: \`quality-results/\`"
            echo
            echo "A successful run verifies only the named tests, validators,"
            echo "artifact checks, and retrieval evaluations executed on this SHA."
            echo "It does not establish deployment, production readiness,"
            echo "legal or regulatory clearance, scientific validation,"
            echo "wet-lab validation, or vulnerability absence."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Quality Gates evidence
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: quality-gates-${{ github.run_id }}-${{ github.run_attempt }}
          path: quality-results/
          if-no-files-found: error
          retention-days: 14
          compression-level: 9
