#:schema https://developers.openai.com/codex/config-schema.json

# =============================================================================
# Asperitas Project-Scoped Codex Configuration
# v2.2-MODEL-PICKER-FINAL
# =============================================================================
#
# STATUS:
# - DESIGN_FINAL
# - RUNTIME_VERIFICATION_REQUIRED
#
# Objective:
# - allow every model exposed by the current account/workspace to be selected;
# - allow reasoning effort to be selected independently for each task;
# - prevent project configuration from resetting the IDE model picker;
# - preserve bounded permissions, sandboxing, concurrency, and connector use;
# - avoid hidden memory contamination and uncontrolled network execution.
#
# MODEL FREEDOM CONTRACT
#
# The following keys are intentionally NOT configured:
#
#   model
#   review_model
#   model_reasoning_effort
#   plan_mode_reasoning_effort
#   model_reasoning_summary
#   model_verbosity
#   service_tier
#
# Omitting them delegates model, reasoning effort, review model, verbosity,
# reasoning summary, and speed-tier selection to the current Codex thread and
# composer model picker.
#
# Suggested manual routing:
#
# - Sol:
#     complex architecture, security, repository-wide reasoning,
#     difficult debugging, deep research, high-value review
#
# - Terra:
#     everyday implementation, tests, documentation, ordinary PR work
#
# - Luna:
#     deterministic extraction, classification, repetitive transformations,
#     narrowly specified high-volume tasks
#
# - GPT-5.5:
#     regression comparison or compatibility checks
#
# Truth boundary:
# This configuration permits selection. It does not unlock models unavailable
# to the current ChatGPT plan, API organization, or managed workspace.
# =============================================================================


# -----------------------------------------------------------------------------
# Repository instruction fidelity
# -----------------------------------------------------------------------------

# Maximum root AGENTS.md read allowance.
# This does not require Codex to load unrelated repository content.
project_doc_max_bytes = 262144


# -----------------------------------------------------------------------------
# Model-independent interaction defaults
# -----------------------------------------------------------------------------

# Personality does not select or lock a model and may still be overridden
# from the active thread where supported.
personality = "pragmatic"

# Never expose private raw chain-of-thought content.
show_raw_agent_reasoning = false

# Avoid aliases, credentials, user profiles, and uncontrolled startup scripts
# inherited from login-shell initialization.
allow_login_shell = false


# -----------------------------------------------------------------------------
# Human approval ownership
# -----------------------------------------------------------------------------

approvals_reviewer = "user"


# -----------------------------------------------------------------------------
# Filesystem and command sandbox
# -----------------------------------------------------------------------------

sandbox_mode = "workspace-write"


# -----------------------------------------------------------------------------
# Evidence freshness
# -----------------------------------------------------------------------------

# Uses the maintained search index by default rather than unrestricted live
# retrieval. A user may explicitly select a different supported search mode
# for an authorized freshness-critical session.
web_search = "cached"


# -----------------------------------------------------------------------------
# Granular approval routing
#
# true means the approval request may be shown to the user.
# It does not mean that the action is pre-approved.
# -----------------------------------------------------------------------------

[approval_policy.granular]

sandbox_approval = true
rules = true
mcp_elicitations = true
request_permissions = true
skill_approval = true


# -----------------------------------------------------------------------------
# Workspace-write sandbox controls
# -----------------------------------------------------------------------------

[sandbox_workspace_write]

# Package managers, arbitrary subprocesses, repository scripts, and skills
# remain offline unless a separate approved permission path is used.
network_access = false


# -----------------------------------------------------------------------------
# Web-search tool configuration
# -----------------------------------------------------------------------------

[tools.web_search]

# Preserve sufficient retrieved evidence for API, dependency, security,
# configuration, and official-document comparisons.
context_size = "high"


# -----------------------------------------------------------------------------
# Subprocess environment filtering
# -----------------------------------------------------------------------------

[shell_environment_policy]

inherit = "core"

# Preserve Codex's built-in KEY / SECRET / TOKEN filtering.
ignore_default_excludes = false

exclude = [
  "*PASSWORD*",
  "*PASSWD*",
  "*CREDENTIAL*",

  "OPENAI_API_KEY",
  "ANTHROPIC_API_KEY",

  "GITHUB_TOKEN",
  "GH_TOKEN",
  "NPM_TOKEN",
  "PYPI_TOKEN",

  "AWS_ACCESS_KEY_ID",
  "AWS_SECRET_ACCESS_KEY",
  "AWS_SESSION_TOKEN",

  "AZURE_CLIENT_SECRET",
  "GOOGLE_APPLICATION_CREDENTIALS",

  "DATABASE_URL",
  "KUBECONFIG",
]


# -----------------------------------------------------------------------------
# Multi-agent control
# -----------------------------------------------------------------------------

[agents]

# Root session depth is zero. Permit only one subordinate layer.
max_depth = 1

# Bound parallelism to prevent uncontrolled agent fan-out.
max_threads = 4

# Maximum runtime for each worker.
job_max_runtime_seconds = 1800

# Preserve a model-visible interruption record.
interrupt_message = true


# -----------------------------------------------------------------------------
# Stable performance and safety features
# -----------------------------------------------------------------------------

[features]

# Approved connector integrations remain available.
apps = true

# Reduce request transport overhead where supported.
enable_request_compression = true

# Make selectable faster service behavior available without forcing it.
fast_mode = true

# Allow persisted task goals and bounded long-running continuation.
goals = true

# Hooks remain disabled pending an independent security and rollback review.
hooks = false

# Repository state, tests, evals, decision logs, and registries remain the
# durable memory authority.
memories = false

# Permit bounded subagent use under the [agents] limits.
multi_agent = true

# Experimental subprocess-network proxying remains disabled.
network_proxy = false

# Enable personality support without locking the model.
personality = true

# Prevent automatic expansion from an unreviewed remote plugin catalog.
remote_plugin = false

# Reduce repeated shell initialization overhead.
shell_snapshot = true
shell_tool = true

# A Skill may not install missing MCP dependencies automatically.
skill_mcp_dependency_install = false


# -----------------------------------------------------------------------------
# Apps and connectors
#
# Read operations remain efficient.
# Writes require user review.
# Destructive tools remain unavailable.
# -----------------------------------------------------------------------------

[apps._default]

enabled = true
approvals_reviewer = "user"

# Prompt for tools classified as writes.
default_tools_approval_mode = "writes"

# Block tools advertising destructive behavior.
destructive_enabled = false

# Allow open-world-capable connector tools where otherwise enabled.
# This does not bypass write approval or enable destructive tools.
open_world_enabled = true


# -----------------------------------------------------------------------------
# Reviewed repository Skills
#
# Skill enablement is not approval to run scripts, change external systems,
# install dependencies, or perform destructive operations.
# -----------------------------------------------------------------------------

[[skills.config]]

path = ".agents/skills/security-review"
enabled = true


[[skills.config]]

path = ".agents/skills/asperitas-v1-architect"
enabled = true
