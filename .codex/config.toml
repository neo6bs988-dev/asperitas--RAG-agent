#:schema https://developers.openai.com/codex/config-schema.json

# =============================================================================
# Asperitas Project-Scoped Codex Configuration
# v2.1-PERFORMANCE-CANDIDATE
# =============================================================================
#
# Candidate objective:
# - improve complex-task correctness and review quality;
# - preserve bounded cost, latency, permissions, and agent concurrency;
# - improve official-document freshness without enabling unrestricted live web;
# - avoid hidden memory contamination and unnecessary experimental features.
#
# Model routing:
# - Default implementation: GPT-5.6 Sol / medium
# - Planning: high
# - Code review: GPT-5.6 Sol
# - Highest-risk/core work: manually escalate Sol to high or xhigh
# - Bounded everyday work: manually select Terra / medium
# - Deterministic repetitive work: manually select Luna / low
# - GPT-5.5: regression comparison only
#
# Truth boundary:
# This candidate is expected to improve accuracy relative to v2-FINAL, but
# improvement is not VERIFIED until it passes the same frozen evals and real-task
# smoke checks as the incumbent.
# =============================================================================


# -----------------------------------------------------------------------------
# Accuracy-first adaptive model baseline
#
# Sol is the default because Asperitas work frequently involves repository-wide
# reasoning, RAG/eval contracts, security, permissions, scientific evidence,
# rights/compliance boundaries, and cross-file consistency.
#
# Medium remains the default reasoning effort to avoid applying high-cost
# reasoning to every trivial task. High/xhigh is selected explicitly when the
# task contract justifies it.
# -----------------------------------------------------------------------------

model = "gpt-5.6-sol"
review_model = "gpt-5.6-sol"

model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "high"

model_reasoning_summary = "concise"
model_verbosity = "medium"

personality = "pragmatic"


# -----------------------------------------------------------------------------
# Repository instruction fidelity
#
# Preserve the complete root AGENTS.md execution constitution. This is a maximum
# read allowance, not an instruction to fill the context with unrelated files.
# -----------------------------------------------------------------------------

project_doc_max_bytes = 262144


# -----------------------------------------------------------------------------
# Reasoning and shell privacy
# -----------------------------------------------------------------------------

show_raw_agent_reasoning = false

# Login shells may load aliases, credentials, user profiles, or uncontrolled
# startup scripts. Use reproducible non-login shells.
allow_login_shell = false


# -----------------------------------------------------------------------------
# Granular human approval
#
# These values allow approval prompts to reach the human reviewer.
# They do not automatically approve the requested operation.
# -----------------------------------------------------------------------------

approval_policy = { granular = {
  sandbox_approval = true,
  rules = true,
  mcp_elicitations = true,
  request_permissions = true,
  skill_approval = true
} }

approvals_reviewer = "user"


# -----------------------------------------------------------------------------
# Filesystem and command-network sandbox
# -----------------------------------------------------------------------------

sandbox_mode = "workspace-write"


[sandbox_workspace_write]

# Package managers, scripts, skills, and arbitrary subprocesses remain offline.
network_access = false


# -----------------------------------------------------------------------------
# Evidence freshness
#
# Cached search uses the OpenAI-maintained search index rather than unrestricted
# live web access. It improves access to current technical documentation while
# preserving a narrower exposure boundary than live retrieval.
#
# For a specifically authorized freshness-critical task, override this session
# to `indexed` or `live`.
# -----------------------------------------------------------------------------

web_search = "cached"


[tools.web_search]

# Preserve enough retrieved context for API, configuration, dependency, and
# security documentation comparisons.
context_size = "high"


# -----------------------------------------------------------------------------
# Subprocess environment filtering
#
# Codex keeps the minimum useful core environment. Built-in exclusions for
# KEY/SECRET/TOKEN remain active, followed by the explicit exclusions below.
# -----------------------------------------------------------------------------

[shell_environment_policy]

inherit = "core"
ignore_default_excludes = false

exclude = [
  "*PASSWORD*",
  "*PASSWD*",
  "*CREDENTIAL*",

  "OPENAI_API_KEY",
  "ANTHROPIC_API_KEY",

  "GITHUB_TOKEN",
  "GH_TOKEN",
  "NPM_TOKEN",
  "PYPI_TOKEN",

  "AWS_ACCESS_KEY_ID",
  "AWS_SECRET_ACCESS_KEY",
  "AWS_SESSION_TOKEN",

  "AZURE_CLIENT_SECRET",
  "GOOGLE_APPLICATION_CREDENTIALS",

  "DATABASE_URL",
  "KUBECONFIG",
]


# -----------------------------------------------------------------------------
# Multi-agent control
#
# A single subagent layer supports independent review and bounded parallelism.
# Recursive agent trees remain blocked.
# -----------------------------------------------------------------------------

[agents]

max_depth = 1
max_threads = 4
job_max_runtime_seconds = 1800
interrupt_message = true


# -----------------------------------------------------------------------------
# Stable performance and safety features
# -----------------------------------------------------------------------------

[features]

# Keep approved connector integrations available.
apps = true

# Reduce streaming transport overhead when supported.
enable_request_compression = true

# Expose Fast-tier selection but do not force it.
fast_mode = true

# Permit persisted goals and bounded continuation for long-running work.
goals = true

# Hooks require independent review before repository activation.
hooks = false

# Repository state, tests, decisions, and source registries are the durable
# memory authority. Hidden cross-session model memory remains disabled.
memories = false

# Subagents are available under the limits above.
multi_agent = true

# Experimental subprocess networking remains disabled.
network_proxy = false

# Keep personality controls available.
personality = true

# Prevent unreviewed remote plugin catalog expansion.
remote_plugin = false

# Reduce repeated command startup overhead.
shell_snapshot = true
shell_tool = true

# Skills may not install missing MCP dependencies automatically.
skill_mcp_dependency_install = false


# -----------------------------------------------------------------------------
# Apps and connectors
#
# Read operations may proceed efficiently.
# Writes require human approval.
# Destructive operations remain blocked.
# -----------------------------------------------------------------------------

[apps._default]

enabled = true
approvals_reviewer = "user"

default_tools_approval_mode = "writes"

destructive_enabled = false

# Non-destructive repository and connected-source reads remain available.
# This does not authorize writes or destructive actions.
open_world_enabled = true


# -----------------------------------------------------------------------------
# Reviewed repository skills
#
# Skill enablement is not approval to execute scripts or perform external writes.
# -----------------------------------------------------------------------------

[[skills.config]]

path = ".agents/skills/security-review"
enabled = true


[[skills.config]]

path = ".agents/skills/asperitas-v1-architect"
enabled = true
