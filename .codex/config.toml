# .codex/config.toml
# Asperitas project-scoped Codex configuration.
# Purpose: safe implementation default for source-grounded, auditable, compliance-aware repo work.
# Boundary: this file configures Codex behavior only; it is not proof of production RAG, vector DB, KG, eval suite, tracing, legal approval, biosafety approval, wet-lab validation, autonomous lab execution, or foundation-model capability.

model = "gpt-5.5"
model_reasoning_effort = "high"
service_tier = "default"
personality = "pragmatic"

approval_policy = "on-request"
sandbox_mode = "workspace-write"
allow_login_shell = false

[sandbox_workspace_write]
network_access = false

[features]
memories = true
js_repl = false 
